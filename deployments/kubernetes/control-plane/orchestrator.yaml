apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-orchestrator
  namespace: forge-control-plane
  labels:
    app: forge-orchestrator
spec:
  replicas: 3
  selector:
    matchLabels:
      app: forge-orchestrator
  template:
    metadata:
      labels:
        app: forge-orchestrator
    spec:
      nodeSelector:
        forge.io/node-type: control-plane
      containers:
        - name: orchestrator
          image: forge/orchestrator:latest
          ports:
            - containerPort: 19080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: forge-credentials
                  key: DATABASE_URL
            - name: REDIS_ADDR
              value: "redis:6379"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 19080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 19080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: forge-control-plane
spec:
  selector:
    app: forge-orchestrator
  ports:
    - port: 19080
      targetPort: 19080
