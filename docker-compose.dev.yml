version: '3.8'
services:
  postgres:
    image: postgres:16
    platform: linux/arm64/v8
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge_dev
      POSTGRES_DB: forge
    ports:
      - "5432:5432"
    volumes:
      - forge_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    platform: linux/arm64/v8
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - forge_redis:/data

  minio:
    image: minio/minio
    platform: linux/arm64/v8
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: forge
      MINIO_ROOT_PASSWORD: forge_dev_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - forge_minio:/data

volumes:
  forge_postgres:
  forge_redis:
  forge_minio:
